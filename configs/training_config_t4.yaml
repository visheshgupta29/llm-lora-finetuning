# ═══════════════════════════════════════════════════════════════
#  QLoRA Fine-Tuning — T4 / Free Tier Optimized (Colab / Kaggle)
# ═══════════════════════════════════════════════════════════════
#
#  Changes vs A100 config:
#    • bf16 → fp16 (T4 lacks bfloat16 support)
#    • tf32 → false (TF32 is Ampere-only)
#    • Batch size 4 → 2 (grad accum 4 → 8 to keep effective=16)
#    • Compute dtype: bfloat16 → float16
#    • max_seq_length: 1024 → 512 (saves ~2 GB VRAM)
#    • max_train_samples: 20000 (fits in Colab time limit)
#
#  ── v1 Results (1 epoch, 20K samples, Kaggle T4) ──────────
#    Exec accuracy: 8%  |  Valid SQL: 100%  |  BLEU: 0.08
#    Primary failure: repetitive generation (72% runtime_error)
#    Root cause: model learned SQL syntax but not when to stop;
#                greedy decoding with weak repetition penalty
#
#  ── v2 Changes (this config) ──────────────────────────────
#    • Epochs: 1 → 3 (more training = better convergence)
#    • Inference: do_sample → false (deterministic decoding)
#    • Inference: repetition_penalty 1.1 → 1.3 (stop loops)
#    • Inference: max_new_tokens 256 → 128 (SQL rarely > 128)
#    • neftune_noise_alpha: 5 (embedding noise regularisation)
#
#  ── v2 Actual Results (Mar 18–19 2026) ────────────────────
#    Early stop: step 1,200 / 3,750 (epoch 0.96) — patience 5/5
#    Best eval_loss: 0.05831 @ step 200 (epoch 0.16)
#    Train loss (avg): 0.09684 | WandB run: nka1xolh
#    Saved adapter: outputs/final-adapter
#    Eval: exec_acc 22%, BLEU 0.096, valid SQL 100%
#    Base comparison (200 samples): base 28.5% > fine-tuned 21.0%
#    Root cause: repetition loops corrupt otherwise-correct predictions
#
#  ── v3 Changes (this config) ──────────────────────────────
#    • Data: append ';' to every SQL completion — model learns to stop
#    • Inference: eos_token_id += ';' (stop at first complete SQL statement)
#    • Inference: repetition_penalty stays at 1.1 (>1.1 causes gibberish)
#    • Inference: REMOVED no_repeat_ngram_size — blocks valid SQL patterns
#    • Prompt: "Generate a single SQL query. Do not repeat conditions."
#    • Epochs: 3 → 1 (3 epochs caused severe overfitting: train_loss=0.006)
#    • Requires retraining (dataset change)
#
#  v3 training results (Mar 23–24 2026):
#    Completed 1 epoch (1250/1250 steps)
#    Train loss: 0.03789 | Best eval loss: 0.02541
#    Peak VRAM: 5.37 GB | Runtime: 4h 45min (17,110 s)
#    Eval: exec_acc 93%, BLEU 0.921, exact_match 76%, valid SQL 100%
#    Additional fix: scan tokenizer vocab for ALL ';' token variants
#    (SentencePiece ▁; vs bare ; have different token IDs)
#
#  Actual VRAM:    ~5.4 GB peak allocated (fits 16 GB T4 with headroom)
#  v1 actual time: ~6h 52min (1 ep, 20K samples, Mar 15–16, 24,720 s)
#  v2 actual time: ~6h 43min (24,200 s) — early stopped at epoch 0.96
#  v3 actual time: 4h 45min (17,110 s) — 1 epoch with ';' in completions
# ───────────────────────────────────────────────────────────────

# ─── Model ────────────────────────────────────────────────────
model:
  name: "mistralai/Mistral-7B-v0.3"
  max_seq_length: 512                  # Reduced from 1024 — most SQL < 512 tokens
  trust_remote_code: false
  device_map: "auto"

# ─── Quantization (BitsAndBytes) ─────────────────────────────
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"    # ← Changed: T4 doesn't support bfloat16
  bnb_4bit_use_double_quant: true

# ─── LoRA ────────────────────────────────────────────────────
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# ─── Dataset ─────────────────────────────────────────────────
dataset:
  name: "b-mc2/sql-create-context"
  train_split: "train"
  test_size: 0.1
  seed: 42
  max_train_samples: 20000             # ← Cap at 20K for free-tier time limits
  max_eval_samples: 1000               # ← Smaller eval set for speed
  processed_dir: "data/processed"

# ─── Training ────────────────────────────────────────────────
training:
  output_dir: "outputs"
  num_train_epochs: 1                  # ← v3: back to 1 (3 epochs caused severe overfitting)
  per_device_train_batch_size: 2       # ← Halved from 4 to fit T4
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8       # ← Doubled: effective batch still 2 × 8 = 16
  gradient_checkpointing: true

  # Optimizer
  optim: "paged_adamw_8bit"
  learning_rate: 2.0e-4
  weight_decay: 0.01
  max_grad_norm: 0.3

  # LR Schedule
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03

  # Logging
  logging_steps: 25                    # ← Less frequent to reduce overhead
  logging_first_step: true

  # Evaluation
  eval_strategy: "steps"
  eval_steps: 200                      # ← Less frequent evals (slower GPU)

  # Checkpointing
  save_strategy: "steps"
  save_steps: 200
  save_total_limit: 2                  # ← Save fewer checkpoints (disk quota)
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

  # Precision — T4 specific
  bf16: false                          # ← T4 does NOT support bfloat16
  fp16: true                           # ← Use float16 instead
  tf32: false                          # ← TF32 is Ampere-only (A100/3090/4090)
  seed: 42
  dataloader_num_workers: 2            # ← Colab/Kaggle has fewer CPU cores
  report_to: "wandb"                   # Set to "none" if you skip W&B setup
  run_name: "mistral-7b-qlora-text2sql-t4"

# ─── SFT ─────────────────────────────────────────────────────
sft:
  max_seq_length: 512                  # ← Reduced from 1024
  packing: false
  neftune_noise_alpha: 5

# ─── Inference ───────────────────────────────────────────────
# v2: deterministic decoding to eliminate repetitive SQL generation
# v3: stronger penalty + ';' stop token (no_repeat_ngram_size REMOVED — caused gibberish)
inference:
  max_new_tokens: 128              # ← v2: 256 → 128 (SQL queries are short)
  temperature: 0.1                 # ignored when do_sample=false, kept for interactive use
  top_p: 0.9                       # ignored when do_sample=false, kept for interactive use
  do_sample: false                 # ← v2: deterministic greedy decoding for eval
  repetition_penalty: 1.1          # ← v3: back to 1.1 — ';' stop token handles stopping
  # no_repeat_ngram_size removed — blocks valid SQL patterns
  # repetition_penalty > 1.1 causes gibberish — blocks tokens the model must reuse from the prompt

# ─── Evaluation ──────────────────────────────────────────────
evaluation:
  num_samples: 200                     # ← Smaller eval on free tier
  run_execution_accuracy: true
  run_bleu: true
  run_exact_match: true
  output_file: "outputs/eval_results.json"

# ─── Hub / Deployment ────────────────────────────────────────
hub:
  push_to_hub: false
  hub_model_id: "visheshgupta29/mistral-7b-text2sql-qlora"
  hub_private: false
